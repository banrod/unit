name: Workstation Validation

on:
  pull_request:
  push:
    branches:
      - main
      - work

jobs:
  workstation-validation:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20.9'
          cache: npm

      - name: Install dependencies
        run: npm ci

      - name: Run workstation validation suite
        run: npm run test:workstation
