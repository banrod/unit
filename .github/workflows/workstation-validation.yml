name: Workstation Validation

on:
  pull_request:
    paths:
      - 'src/**'
      - 'workstation/**'
      - 'package.json'
      - 'package-lock.json'
      - '.github/workflows/workstation-validation.yml'
  push:
    branches:
      - main
      - work
    paths:
      - 'src/**'
      - 'workstation/**'
      - 'package.json'
      - 'package-lock.json'
      - '.github/workflows/workstation-validation.yml'

permissions:
  contents: read

concurrency:
  group: workstation-validation-${{ github.ref }}
  cancel-in-progress: true

jobs:
  workstation-validation:
    runs-on: ubuntu-latest
    timeout-minutes: 20
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20.9'
          cache: npm

      - name: Install dependencies
        run: npm ci

      - name: Run workstation validation suite
        run: npm run test:workstation

      - name: Write registry report summary
        if: always()
        run: |
          if [ -f workstation/notes/registry-report.md ]; then
            {
              echo "## Registry Data Quality Report"
              echo
              sed -n '1,40p' workstation/notes/registry-report.md
            } >> "$GITHUB_STEP_SUMMARY"
          else
            echo "Registry report not generated." >> "$GITHUB_STEP_SUMMARY"
          fi

      - name: Upload registry report artifact
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: registry-report
          path: |
            workstation/notes/registry-report.md
            workstation/notes/registry-report.json
          if-no-files-found: warn
