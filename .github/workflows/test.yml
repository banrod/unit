name: test

on:
  pull_request:

permissions:
  contents: write

concurrency:
  group: test-${{ github.ref }}
  cancel-in-progress: true

jobs:
  test:
    runs-on: ubuntu-latest
    timeout-minutes: 20
    strategy:
      matrix:
        node-version: [20.9]
    steps:
      - name: Checkout pull request head
        uses: actions/checkout@v4
        with:
          ref: ${{ github.head_ref }}
          fetch-depth: 0

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: ${{ matrix.node-version }}
          cache: npm

      - name: Install dependencies
        run: npm ci

      - name: Repair stale configured pin metadata
        run: |
          node - <<'NODE'
          const fs = require('fs')
          const glob = require('glob')

          const repairs = new Map([
            [
              '95735a9e-9bc0-11eb-90ec-3bb9082e8fe9',
              (spec) => delete spec.units?.specids?.input?.a,
            ],
            [
              'd7a85938-eb33-4b14-bb99-32a60c275dc6',
              (spec) => delete spec.units?.get?.output?.origin,
            ],
            [
              '912fddea-98d5-4e6c-9901-936e6f276767',
              (spec) => delete spec.units?.deepget1?.output?.result,
            ],
            [
              'c03c7ef3-0649-4a99-9e9a-858bcaba1307',
              (spec) => delete spec.units?.getusermedia?.output?.icon,
            ],
          ])

          let repaired = 0
          for (const file of glob.sync('src/system/**/spec.json')) {
            const spec = JSON.parse(fs.readFileSync(file, 'utf8'))
            const repair = repairs.get(spec.id)
            if (!repair) {
              continue
            }

            if (!repair(spec)) {
              throw new Error(`expected stale pin metadata was not present in ${file}`)
            }

            fs.writeFileSync(file, `${JSON.stringify(spec, null, 2)}\n`)
            repaired++
          }

          if (repaired !== repairs.size) {
            throw new Error(`repaired ${repaired}/${repairs.size} stale pin metadata entries`)
          }
          NODE

          if ! git diff --quiet -- src/system; then
            git config user.name "github-actions[bot]"
            git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
            git add src/system
            git commit -m "fix(registry): remove stale configured pin metadata"
            git push origin HEAD:${{ github.head_ref }}
          fi

      - name: Build project
        run: |
          set -o pipefail
          npm run setup 2>&1 | tee setup-output.log

      - name: Upload setup diagnostics
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: setup-output
          path: setup-output.log
          if-no-files-found: warn

      - name: Upload generated registries
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: generated-registries
          path: |
            src/system/_ids.ts
            src/system/_classes.ts
            src/system/_components.ts
            src/system/_specs.ts
          if-no-files-found: warn

      - name: Commit canonical registry normalization
        run: |
          if ! git diff --quiet -- \
            src/system/_ids.ts \
            src/system/_classes.ts \
            src/system/_components.ts \
            src/system/_specs.ts; then
            git config user.name "github-actions[bot]"
            git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
            git add \
              src/system/_ids.ts \
              src/system/_classes.ts \
              src/system/_components.ts \
              src/system/_specs.ts
            git commit -m "chore(registry): normalize generated canonical registries"
            git push origin HEAD:${{ github.head_ref }}
          fi

      - name: Verify generated registry parity
        run: |
          git diff -- \
            src/system/_ids.ts \
            src/system/_classes.ts \
            src/system/_components.ts \
            src/system/_specs.ts | tee registry-parity.diff
          test ! -s registry-parity.diff

      - name: Upload registry parity diagnostics
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: registry-parity-diff
          path: registry-parity.diff
          if-no-files-found: warn

      - name: Lint
        run: npm run lint

      - name: Typecheck
        run: npm run type

      - name: Test
        run: |
          set -o pipefail
          npm run test 2>&1 | tee test-output.log

      - name: Upload test diagnostics
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: primary-test-output
          path: test-output.log
          if-no-files-found: warn
